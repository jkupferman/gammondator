<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Gammondator favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9e2bb"/>
      <stop offset="100%" stop-color="#efd1a2"/>
    </linearGradient>
    <linearGradient id="point" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8955b"/>
      <stop offset="100%" stop-color="#8b572f"/>
    </linearGradient>
    <radialGradient id="checkerFill" cx="34%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="45%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1d1d1d"/>
    </radialGradient>
    <filter id="checkerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="10" fill="url(#bg)"/>

  <polygon points="8,6 56,6 32,63 32,63" fill="url(#point)"/>

  <circle cx="32" cy="24" r="13" fill="url(#checkerFill)" stroke="#2b2b2b" stroke-width="2" filter="url(#checkerShadow)"/>
  <ellipse cx="27.5" cy="19.5" rx="6.2" ry="4.4" fill="#ffffff" fill-opacity="0.16"/>
</svg>
