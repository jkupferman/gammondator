<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gammondator</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>Gammondator</h1>
      <div class="actions">
        <button id="newGameBtn">New Game</button>
        <button id="tipBtn">Tip</button>
      </div>
    </header>

    <section class="status-bar">
      <span id="sessionStatus">Session: -</span>
      <span id="turnStatus">Turn: -</span>
      <span id="diceStatus">Dice: -</span>
    </section>

    <section class="board-panel">
      <div class="board-stage">
        <aside class="off-rail-wrap" id="whiteOffRail"></aside>
        <div class="board-grid" id="boardGrid"></div>
        <aside class="off-rail-wrap" id="blackOffRail"></aside>
      </div>
      <p class="move-status" id="moveStatus">Select a checker to move.</p>
    </section>

    <section class="feedback-panel">
      <h2>Move Feedback</h2>
      <pre id="feedback">Starting up...</pre>
    </section>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
