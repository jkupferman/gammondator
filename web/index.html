<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gammondator</title>
  <link rel="icon" type="image/svg+xml" href="/web/favicon.svg" />
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>Gammondator</h1>
      <div class="actions">
        <button id="newGameBtn">New Game</button>
        <button id="tipBtn">Tip</button>
      </div>
    </header>

    <section class="status-bar">
      <span id="turnStatus">Turn: -</span>
      <span id="diceStatus">Dice: -</span>
      <span id="recordStatus">Record: 0-0</span>
    </section>

    <section class="board-panel">
      <div class="board-stage">
        <div class="board-grid" id="boardGrid"></div>
        <aside class="off-column" id="offColumn"></aside>
      </div>
      <p class="move-status" id="moveStatus">Select a checker to move.</p>
    </section>

    <section class="feedback-panel">
      <h2>Move Feedback</h2>
      <pre id="feedback">Starting up...</pre>
    </section>

    <footer class="debug-footer">
      <button id="debugToggle" class="debug-toggle" type="button" aria-expanded="false">Debug</button>
      <section id="debugPanel" class="debug-panel" hidden>
        <pre id="debugInfo">Loading debug info...</pre>
      </section>
    </footer>
  </main>

  <script type="module" src="/web/js/app.js?v=20260303b"></script>
</body>
</html>
