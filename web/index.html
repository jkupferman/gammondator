<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gammondator | Backgammon Trainer with AI Move Feedback</title>
  <meta
    name="description"
    content="Train your backgammon decisions with instant AI feedback, tips, and move analysis after every turn."
  />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Gammondator" />
  <meta property="og:title" content="Gammondator | Backgammon Trainer with AI Move Feedback" />
  <meta
    property="og:description"
    content="Play backgammon against AI and get immediate move quality feedback, better lines, and coaching."
  />
  <meta property="og:url" content="https://gammondator-e37bda20353e.herokuapp.com/" />
  <meta property="og:image" content="https://gammondator-e37bda20353e.herokuapp.com/web/favicon.svg" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Gammondator | Backgammon Trainer with AI Move Feedback" />
  <meta
    name="twitter:description"
    content="Play backgammon against AI and get immediate move quality feedback, better lines, and coaching."
  />
  <link rel="canonical" href="https://gammondator-e37bda20353e.herokuapp.com/" />
  <link rel="icon" type="image/svg+xml" href="/web/favicon.svg" />
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>Gammondator</h1>
      <div class="actions">
        <button id="newGameBtn">New Game</button>
        <button id="tipBtn">Tip</button>
      </div>
    </header>

    <section class="status-bar">
      <span id="turnStatus">Turn: -</span>
      <span id="diceStatus">Dice: -</span>
      <span id="recordStatus">Record: 0-0</span>
    </section>

    <section class="board-panel">
      <div class="board-stage">
        <div class="board-grid" id="boardGrid"></div>
        <aside class="off-column" id="offColumn"></aside>
      </div>
      <p class="move-status" id="moveStatus">Select a checker to move.</p>
    </section>

    <section class="feedback-panel">
      <h2>Move Feedback</h2>
      <pre id="feedback">Starting up...</pre>
    </section>

    <footer class="debug-footer">
      <button id="debugToggle" class="debug-toggle" type="button" aria-expanded="false">Debug</button>
      <section id="debugPanel" class="debug-panel" hidden>
        <pre id="debugInfo">Loading debug info...</pre>
      </section>
    </footer>
  </main>

  <script type="module" src="/web/js/app.js?v=20260303b"></script>
</body>
</html>
